<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理員登入 — 2026 青年領袖營</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="./admin.css" />
</head>
<body class="admin-login-page">

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <span>⛺</span>
        <p>青年領袖營 2026</p>
        <h1>管理後台</h1>
      </div>

      <form class="login-form" id="loginForm" novalidate>
        <div class="field">
          <label for="loginEmail">管理員 Email</label>
          <input type="email" id="loginEmail" placeholder="admin@example.com"
                 autocomplete="email" inputmode="email" />
          <span class="field-err" id="err-loginEmail"></span>
        </div>
        <div class="field">
          <label for="loginPassword">密碼</label>
          <div class="pw-wrap">
            <input type="password" id="loginPassword" placeholder="請輸入密碼"
                   autocomplete="current-password" />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="顯示密碼">👁</button>
          </div>
          <span class="field-err" id="err-loginPassword"></span>
        </div>

        <div class="field-err login-err" id="err-login"></div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="login-text">登入</span>
          <span class="login-loading" hidden>登入中…</span>
        </button>
      </form>

      <a href="../index.html" class="back-to-site">← 返回活動網站</a>
    </div>
  </div>

  <script type="module" src="./admin-auth.js"></script>
</body>
</html>
