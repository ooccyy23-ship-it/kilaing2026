<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理平台 | 2026青年領袖營</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/admin-styles.css" />
  </head>
  <body class="admin-page">

    <!-- ── Login screen ── -->
    <div id="loginScreen" class="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <span class="brand-mark">Y</span>
        </div>
        <h1 class="login-title">管理平台</h1>
        <p class="login-sub">2026 青年領袖營 · 僅限授權人員登入</p>
        <form id="adminLoginForm" class="login-form">
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" placeholder="admin@example.com" required />
          </label>
          <label>
            <span>密碼</span>
            <input name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
          </label>
          <button class="btn btn-primary btn-full" type="submit">登入</button>
          <p id="loginStatus" class="status-msg" role="status" aria-live="polite"></p>
        </form>
        <a href="/" class="login-back">← 返回報名頁面</a>
      </div>
    </div>

    <!-- ── Admin shell ── -->
    <div id="adminShell" class="admin-shell" hidden>

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <span class="brand-mark">Y</span>
          <span class="sidebar-brand-name">青年領袖營</span>
        </div>

        <nav class="sidebar-nav" aria-label="後台功能">
          <a href="#" class="nav-item active" data-page="registrations">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 0 2-2h2a2 2 0 0 0 2 2"/></svg>
            報名名單
          </a>
          <a href="/" class="nav-item" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            前台頁面
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="sidebar-user">
            <div class="user-avatar" id="userAvatar">A</div>
            <div class="user-info">
              <span class="user-email" id="adminEmail">—</span>
              <span class="user-role">管理員</span>
            </div>
          </div>
          <button id="logoutButton" class="btn btn-ghost btn-sm" type="button">登出</button>
        </div>
      </aside>

      <!-- Main content -->
      <main class="admin-content">

        <!-- Top bar -->
        <div class="topbar">
          <div class="topbar-left">
            <h2 class="page-title">報名名單</h2>
            <span class="badge" id="totalBadge">—</span>
          </div>
          <div class="topbar-right">
            <button id="refreshButton" class="btn btn-ghost btn-sm" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              重新整理
            </button>
            <button id="downloadCsvButton" class="btn btn-primary btn-sm" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              下載 CSV
            </button>
          </div>
        </div>

        <!-- Stats row -->
        <div class="stats-row" id="statsRow">
          <div class="stat-card">
            <span class="stat-label">總報名人數</span>
            <span class="stat-value" id="statTotal">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">未滿 18 歲</span>
            <span class="stat-value" id="statUnder18">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">需接送</span>
            <span class="stat-value" id="statTransport">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">素食</span>
            <span class="stat-value" id="statVeg">—</span>
          </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
          <input id="searchInput" class="filter-input filter-search" type="search" placeholder="搜尋姓名、電話、Email、教會、身分證字號…" />
          <select id="transportFilter" class="filter-select">
            <option value="">全部接送需求</option>
            <option value="需接送">需接送</option>
            <option value="自行前往">自行前往</option>
          </select>
          <button id="clearFilters" class="btn btn-ghost btn-sm">清除篩選</button>
        </div>

        <p class="filter-summary" id="filterSummary"></p>

        <!-- Table -->
        <div class="table-wrap" aria-live="polite">
          <table>
            <thead>
              <tr>
                <th>報名時間</th>
                <th>姓名</th>
                <th>性別</th>
                <th>電話</th>
                <th>Email</th>
                <th>教會</th>
                <th>尺寸</th>
                <th>接送</th>
                <th>未滿18</th>
                <th>飲食</th>
                <th>同意書</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="registrationRows">
              <tr><td colspan="12" class="table-msg">載入中…</td></tr>
            </tbody>
          </table>
        </div>

      </main>
    </div>

    <!-- ── Edit modal ── -->
    <div id="editModal" class="modal-backdrop" hidden aria-modal="true" role="dialog" aria-labelledby="editModalTitle">
      <div class="modal">
        <div class="modal-header">
          <h3 id="editModalTitle">編輯報名資料</h3>
          <button class="modal-close" id="editModalClose" aria-label="關閉">✕</button>
        </div>
        <form id="editForm" class="modal-body">
          <input type="hidden" id="editFirebaseId" />
          <div class="modal-grid">
            <label class="modal-field">
              <span>姓名</span>
              <input id="editName" name="name" required />
            </label>
            <label class="modal-field">
              <span>性別</span>
              <select id="editGender" name="gender">
                <option value="男">男</option>
                <option value="女">女</option>
                <option value="其他">其他</option>
              </select>
            </label>
            <label class="modal-field">
              <span>電話</span>
              <input id="editPhone" name="phone" />
            </label>
            <label class="modal-field">
              <span>Email</span>
              <input id="editEmail" name="email" type="email" />
            </label>
            <label class="modal-field">
              <span>教會名稱</span>
              <input id="editChurch" name="church" />
            </label>
            <label class="modal-field">
              <span>地址</span>
              <input id="editAddress" name="address" />
            </label>
            <label class="modal-field">
              <span>衣服尺寸</span>
              <select id="editShirtSize" name="shirtSize">
                <option>XS</option><option>S</option><option>M</option>
                <option>L</option><option>XL</option><option>2XL</option><option>3XL</option>
              </select>
            </label>
            <label class="modal-field">
              <span>接送需求</span>
              <select id="editTransport" name="transport">
                <option value="需接送">需接送</option>
                <option value="自行前往">自行前往</option>
              </select>
            </label>
            <label class="modal-field">
              <span>飲食</span>
              <select id="editDiet" name="diet">
                <option value="葷食">葷食</option>
                <option value="素食">素食</option>
                <option value="其他">其他</option>
              </select>
            </label>
            <label class="modal-field" id="editDietOtherWrap">
              <span>飲食說明</span>
              <input id="editDietOther" name="dietOther" />
            </label>
          </div>
          <p id="editStatus" class="status-msg" role="status" aria-live="polite"></p>
        </form>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="editModalCancel" type="button">取消</button>
          <button class="btn btn-primary" id="editModalSave" type="button">儲存變更</button>
        </div>
      </div>
    </div>

    <!-- ── Delete confirm modal ── -->
    <div id="deleteModal" class="modal-backdrop" hidden aria-modal="true" role="dialog" aria-labelledby="deleteModalTitle">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3 id="deleteModalTitle">確認刪除</h3>
          <button class="modal-close" id="deleteModalClose" aria-label="關閉">✕</button>
        </div>
        <div class="modal-body">
          <p class="delete-warning">你確定要刪除 <strong id="deleteTargetName"></strong> 的報名資料嗎？</p>
          <p class="delete-note">此操作無法復原，相關的家長同意書檔案也會一併刪除。</p>
          <p id="deleteStatus" class="status-msg" role="status" aria-live="polite"></p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="deleteModalCancel" type="button">取消</button>
          <button class="btn btn-danger" id="deleteModalConfirm" type="button">確認刪除</button>
        </div>
      </div>
    </div>

    <script type="module" src="/admin.js"></script>
  </body>
</html>
