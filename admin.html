<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理平台登入｜2026第五屆青年領袖營</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="admin-page">
    <header class="site-header">
      <a class="brand" href="./index.html">
        <span class="brand-mark">Y</span>
        <span>青年領袖營</span>
      </a>
      <nav aria-label="管理導覽">
        <a href="./index.html">返回首頁</a>
      </nav>
    </header>

    <main class="admin-main">
      <section class="section-heading">
        <p class="eyebrow">Admin</p>
        <h1>管理平台登入</h1>
        <p>請先登入管理員帳號，系統會在成功後帶你進入獨立的管理頁面。</p>
      </section>

      <form id="adminLoginForm" class="admin-login">
        <label>
          <span>Email</span>
          <input name="email" type="email" autocomplete="email" required />
        </label>
        <label>
          <span>密碼</span>
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <button class="button primary" type="submit">登入管理平台</button>
        <p id="loginStatus" class="form-status" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script type="module" src="./admin-login.js"></script>
  </body>
</html>
